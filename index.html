<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soom Pulse | Official Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f3ba2f; --bg: #0d0118; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            text-align: center; overflow-x: hidden;
        }
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #2e0854 0%, #0d0118 100%);
            z-index: -1;
        }
        .container { padding: 20px; max-width: 600px; z-index: 1; }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; color: var(--primary); text-shadow: 0 0 15px rgba(243, 186, 47, 0.6); margin-bottom: 5px; }

        .rabbit-logo {
            width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--primary);
            box-shadow: 0 0 25px var(--primary); margin-bottom: 20px;
            animation: pulse 2.5s infinite ease-in-out;
            object-fit: cover;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--primary); }
            50% { transform: scale(1.05); box-shadow: 0 0 35px var(--primary); }
            100% { transform: scale(1); box-shadow: 0 0 15px var(--primary); }
        }

        .tagline { letter-spacing: 2px; color: #e0e0e0; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        .description { color: #b0b0b0; line-height: 1.6; margin-bottom: 30px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 320px; margin: 20px auto; }
        .btn { padding: 14px 20px; border-radius: 12px; font-weight: bold; text-decoration: none; transition: 0.3s; display: block; }
        .btn-main { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(243, 186, 47, 0.4); }
        .btn-main:hover { background: #fff; transform: translateY(-2px); }
        .btn-secondary { background: rgba(255, 255, 255, 0.08); color: white; border: 1px solid rgba(255, 255, 255, 0.15); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .footer { margin-top: 40px; font-size: 0.7rem; color: #555; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <img src="https://raw.githubusercontent.com/Saz-coin/Soom.website/main/IMG_20260417_164845.jpg" alt="Soom Pulse Rabbit" class="rabbit-logo">
        
        <h1>SOOM PULSE</h1>
        <p class="tagline">The Pulse of Web3 Community</p>
        <p class="description">Tap to Mine, complete missions, and invite friends to secure your spot for the upcoming $SOOM Airdrop. Start farming today!</p>

        <div class="btn-group">
            <a href="https://t.me/SOOM_COIN_bot" class="btn btn-main">🚀 LAUNCH BOT (TAP TO EARN)</a>
            <a href="https://t.me/Soomcoin1" class="btn btn-secondary">📢 JOIN ANNOUNCEMENTS</a>
            <a href="https://x.com/Soom_project00" class="btn btn-secondary">🐦 FOLLOW ON X</a>
        </div>
        
        <div class="footer">© 2026 SOOM PULSE | FUEL THE DIGITAL REVOLUTION</div>
    </div>
</body>
    </html>
