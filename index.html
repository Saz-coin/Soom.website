<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soom Pulse | Official Project</title>
    <meta name="description" content="انضم إلى مجتمع Soom Pulse على تيليجرام. ابدأ التعدين، ادعُ الأصدقاء، واحصل على الإيردروب القادم.">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f3ba2f; --bg: #05070a; --accent: #00ffcc; }
        body { 
            background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden; text-align: center;
        }
        .container { padding: 20px; max-width: 600px; }
        
        /* تأثير الخلفية */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #4a1d5a 0%, #05070a 100%);
            z-index: -1;
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 20px rgba(243, 186, 47, 0.5); }
        p { font-size: 1.1rem; color: #d1d5db; line-height: 1.6; }

        .rabbit-logo {
            width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--primary);
            box-shadow: 0 0 30px var(--primary); margin-bottom: 30px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px var(--primary); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px var(--primary); }
            100% { transform: scale(1); box-shadow: 0 0 20px var(--primary); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; margin: 30px auto; }
        
        .btn {
            padding: 15px 25px; border-radius: 15px; font-weight: bold; text-decoration: none;
            transition: 0.3s; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-main { background: var(--primary); color: black; box-shadow: 0 5px 15px rgba(243, 186, 47, 0.4); }
        .btn-main:hover { transform: translateY(-3px); background: #fff; }

        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        footer { margin-top: 50px; font-size: 0.9rem; color: #666; font-family: 'Orbitron'; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <img src="https://i.postimg.cc/7LFJcv9t/file-0000000035fc71f6b4c0b4258a4dba26.png" alt="Soom Pulse Rabbit" class="rabbit-logo">
        
        <h1>SOOM PULSE</h1>
        <p>مرحباً بك في مستقبل التعدين المجتمعي. <br> كبّس، جمّع النقاط، واستعد للإيردروب الأكبر على تيليجرام.</p>

        <div class="btn-group">
            <a href="https://t.me/SOOM_COIN_bot" class="btn btn-main">🚀 افتح البوت وابدأ الآن</a>
            <a href="https://t.me/Soomcoin1" class="btn btn-secondary">📢 انضم لقناة الأخبار</a>
            <a href="https://x.com/YourXUsername" class="btn btn-secondary">🐦 تابعنا على X</a>
        </div>

        <footer>© 2026 SOOM PULSE | THE DIGITAL REVOLUTION</footer>
    </div>
</body>
</html>
